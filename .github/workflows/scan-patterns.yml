name: Scan patterns and build report

# How to use:
# GitHub "Actions" tab -> "Scan patterns and build report" -> "Run workflow".
# Type the tickers, pick a pattern and timeframe, then Run.
# The report appears as:
#   1. A summary table on the run page (Job Summary)
#   2. A downloadable "scan-report" artifact (scan_report.html)
# No email, no secrets required.
on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Tickers (space/comma sep). US: AAPL | A-share: 600519 or 000001 (suffix auto-added) | NSE: RELIANCE.NS"
        required: true
        default: "AAPL MSFT NVDA GOOGL AMZN"
      pattern:
        description: "Pattern to scan"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - bull
          - bear
          - bull_harm
          - bear_harm
          - vcpu
          - vcpd
          - dbot
          - dtop
          - hnsu
          - hnsd
          - trng
      timeframe:
        description: "Timeframe"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly
          - monthly

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install yfinance

      - name: Run scan and build report
        working-directory: src
        env:
          SYMBOLS: ${{ github.event.inputs.symbols }}
          PATTERN: ${{ github.event.inputs.pattern }}
          TIMEFRAME: ${{ github.event.inputs.timeframe }}
        run: python scan_and_report.py

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: scan-report
          path: scan_report.html
          if-no-files-found: ignore
